name: freshness-check

# Weekly drift + staleness check against the live sources. Opens (or updates) a
# GitHub issue when any corpus doc needs re-verification. Verification itself is
# a human step — this never edits the corpus.

on:
  schedule:
    - cron: "0 9 * * 1" # Mondays 09:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - id: fresh
        run: |
          set +e
          npm run check-freshness > freshness-report.txt 2> freshness-log.txt
          echo "exit=$?" >> "$GITHUB_OUTPUT"
          cat freshness-log.txt
      - if: steps.fresh.outputs.exit != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('freshness-log.txt', 'utf8').slice(0, 60000);
            const body = `Automated freshness check flagged docs for re-verification.\n\n\`\`\`\n${log}\n\`\`\`\n\nVerify each flagged doc against its source, bump \`verifiedAt\` + CHANGELOG, then run \`npm run seed-sources -- <id...>\` and commit the snapshot.`;
            const title = 'Corpus freshness: re-verification needed';
            const { owner, repo } = context.repo;
            const { data: open } = await github.rest.issues.listForRepo({ owner, repo, state: 'open', labels: 'freshness' });
            if (open.length) {
              await github.rest.issues.createComment({ owner, repo, issue_number: open[0].number, body });
            } else {
              await github.rest.issues.create({ owner, repo, title, labels: ['freshness'], body });
            }
